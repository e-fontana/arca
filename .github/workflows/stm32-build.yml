name: STM32 CMake Build

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    name: Build (${{ (github.ref == 'refs/heads/main' || github.base_ref == 'main') && 'Release' || 'Debug' }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set build type
        id: preset
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ] || \
            [ "${{ github.base_ref }}" = "main" ]; then
            echo "build_type=Release" >> $GITHUB_OUTPUT
          else
            echo "build_type=Debug" >> $GITHUB_OUTPUT
          fi

      - name: Install ARM GCC toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: '13.3.Rel1'

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Configure CMake
        run: cmake --preset ${{ steps.preset.outputs.build_type }}

      - name: Build
        run: cmake --build --preset ${{ steps.preset.outputs.build_type }} -- -j$(nproc)

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ steps.preset.outputs.build_type }}
          path: |
            build/${{ steps.preset.outputs.build_type }}/*.elf
            build/${{ steps.preset.outputs.build_type }}/*.bin
            build/${{ steps.preset.outputs.build_type }}/*.hex
          retention-days: 7